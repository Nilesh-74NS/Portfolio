{% extends 'base.html' %}

{% block title %}
Contact
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-lg border-0 p-4 contact-card">

                    <!-- Heading -->

                    <h1 class="text-center fw-bold mb-4">
                        Contact <span class="text-info">Me</span>
                    </h1>

                    <p class="text-center text-secondary mb-5">
                        Feel free to contact me for projects, internships,
                        collaborations, or any opportunities.
                    </p>
                    
                    
                    <!-- Success Message -->
                    {% if success %}

                    <div class="alert alert-success alert-dismissible fade show" role="alert">

                        Message Sent Successfully!

                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="alert">
                        </button>

                    </div>

                    {% endif %}

                    <!-- Contact Form -->

                    <form action="/send" method="POST">

                        <!-- First Row -->

                        <div class="row">

                            <div class="col-md-6 mb-4">

                                <input
                                    type="text"
                                    name="name"
                                    class="form-control custom-input"
                                    placeholder="Full Name"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-4">

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control custom-input"
                                    placeholder="Email Address"
                                    required
                                >

                            </div>

                        </div>

                        <!-- Subject -->

                        <div class="mb-4">

                            <input
                                type="text"
                                name="subject"
                                class="form-control custom-input"
                                placeholder="Email Subject"
                                required
                            >

                        </div>

                        <!-- Message -->

                        <div class="mb-4">

                            <textarea
                                name="message"
                                rows="6"
                                class="form-control custom-input"
                                placeholder="Your Message"
                                required
                            ></textarea>

                        </div>

                        <!-- Submit Button -->

                        <button
                            type="submit"
                            class="btn btn-info w-100 fw-bold py-3 send-btn"
                        >
                            Send Message
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
