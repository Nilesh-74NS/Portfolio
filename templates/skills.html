{% extends 'base.html' %}

{% block title %}
Skills
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <!-- Heading -->

        <div class="text-center mb-5">

            <h1 class="fw-bold">
                My <span class="text-info">Skills</span>
            </h1>

            <p class="text-secondary mt-3">
                Technologies and tools that I use for development.
            </p>

        </div>

        <!-- Skills Cards -->

        <div class="row g-4">

            <!-- HTML -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bxl-html5 skill-icon'></i>

                        <h4 class="mt-3">HTML</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 90%;"
                             aria-valuenow="90"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            90%

                        </div>

                    </div>

                </div>

            </div>

            <!-- CSS -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bxl-css3 skill-icon'></i>

                        <h4 class="mt-3">CSS</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 85%;"
                             aria-valuenow="85"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            85%

                        </div>

                    </div>

                </div>

            </div>

            <!-- Bootstrap -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bxl-bootstrap skill-icon'></i>

                        <h4 class="mt-3">Bootstrap 5</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 80%;"
                             aria-valuenow="80"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            80%

                        </div>

                    </div>

                </div>

            </div>

            <!-- JavaScript -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bxl-javascript skill-icon'></i>

                        <h4 class="mt-3">JavaScript</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 40%;"
                             aria-valuenow="40"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            40%

                        </div>

                    </div>

                </div>

            </div>

            <!-- Python -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bxl-python skill-icon'></i>

                        <h4 class="mt-3">Python</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 80%;"
                             aria-valuenow="80"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            80%

                        </div>

                    </div>

                </div>

            </div>

            <!-- Flask -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx bx-code-alt skill-icon'></i>

                        <h4 class="mt-3">Flask</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 75%;"
                             aria-valuenow="75"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            75%

                        </div>

                    </div>

                </div>

            </div>


            <!-- C -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx  bx-code-block skill-icon'></i>

                        <h4 class="mt-3">C</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 75%;"
                             aria-valuenow="75"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            75%

                        </div>

                    </div>

                </div>

            </div>

              <!-- C++ -->

            <div class="col-md-6 col-lg-4">

                <div class="card skill-card border-0 shadow-lg h-100 p-4">

                    <div class="text-center">

                        <i class='bx  bx-code-block skill-icon'></i>

                        <h4 class="mt-3">C++</h4>

                    </div>

                    <div class="progress mt-4">

                        <div class="progress-bar bg-info"
                             role="progressbar"
                             style="width: 60%;"
                             aria-valuenow="60"
                             aria-valuemin="0"
                             aria-valuemax="100">

                            60%

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
